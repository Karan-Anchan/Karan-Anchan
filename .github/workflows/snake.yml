name: snake

on:
  schedule:
    # off-peak minutes; top-of-hour crons on GitHub get delayed/skipped under load
    - cron: "23 2 * * *"
    - cron: "23 14 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Karan-Anchan
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=#c7f284&color_dots=#161b22,#233a1d,#3f6212,#65a30d,#a3e635
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
