<svg width="900" height="250" viewBox="0 0 900 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spec" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="900" y2="0" spreadMethod="reflect">
      <stop offset="0" stop-color="#c7f284"/>
      <stop offset="0.25" stop-color="#67e8f9"/>
      <stop offset="0.5" stop-color="#c4b5fd"/>
      <stop offset="0.75" stop-color="#f9a8d4"/>
      <stop offset="1" stop-color="#fbbf24"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="1800 0" dur="9s" repeatCount="indefinite"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.06"/>
    </pattern>
    <clipPath id="panel"><rect width="900" height="250" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#panel)">
    <rect width="900" height="250" fill="#09090b"/>
    <rect width="900" height="250" fill="url(#dots)"/>
    <ellipse cx="760" cy="30" rx="320" ry="150" fill="#c4b5fd" opacity="0.05"/>
    <ellipse cx="140" cy="230" rx="300" ry="130" fill="#67e8f9" opacity="0.05"/>

    <!-- name -->
    <text x="44" y="88" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="58" letter-spacing="-2" fill="#fafafa">KARAN</text>
    <text x="44" y="148" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="58" letter-spacing="-2" fill="none" stroke="url(#spec)" stroke-width="1.6">ANCHAN</text>
    <!-- blinking cursor block -->
    <rect x="316" y="118" width="20" height="26" fill="url(#spec)">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.3s" repeatCount="indefinite"/>
    </rect>

    <!-- cycling mantras (unique to the profile, not the site) -->
    <g font-family="'Courier New', monospace" font-size="15" font-weight="bold" letter-spacing="2">
      <text x="46" y="200" fill="#c7f284" opacity="0">
        &gt; curiosity &#8811; compute
        <animate attributeName="opacity" values="0;1;1;0;0;0;0" keyTimes="0;0.05;0.28;0.33;0.34;0.99;1" dur="10.5s" repeatCount="indefinite"/>
      </text>
      <text x="46" y="200" fill="#67e8f9" opacity="0">
        &gt; reproduce first, believe later
        <animate attributeName="opacity" values="0;0;0;1;1;0;0" keyTimes="0;0.33;0.38;0.43;0.61;0.66;1" dur="10.5s" repeatCount="indefinite"/>
      </text>
      <text x="46" y="200" fill="#f9a8d4" opacity="0">
        &gt; gradients descend. standards don't.
        <animate attributeName="opacity" values="0;0;0;1;1;0;0" keyTimes="0;0.66;0.71;0.76;0.94;0.99;1" dur="10.5s" repeatCount="indefinite"/>
      </text>
    </g>
    <text x="46" y="224" font-family="'Courier New', monospace" font-size="12" letter-spacing="2" fill="#71717a">AI RESEARCHER &amp; ENGINEER · FREIBURG</text>

    <!-- loss curve figure -->
    <g transform="translate(560, 36)">
      <line x1="0" y1="0" x2="0" y2="150" stroke="#3f3f46" stroke-width="1"/>
      <line x1="0" y1="150" x2="290" y2="150" stroke="#3f3f46" stroke-width="1"/>
      <g stroke="#27272a" stroke-width="1" stroke-dasharray="2 5">
        <line x1="0" y1="38" x2="290" y2="38"/>
        <line x1="0" y1="75" x2="290" y2="75"/>
        <line x1="0" y1="112" x2="290" y2="112"/>
      </g>
      <path d="M4 8 C 60 16, 70 70, 120 100 S 230 138, 286 141"
            stroke="url(#spec)" stroke-width="2.5" fill="none" stroke-linecap="round"
            stroke-dasharray="420" stroke-dashoffset="420">
        <animate attributeName="stroke-dashoffset" from="420" to="0" dur="3.2s" fill="freeze"/>
      </path>
      <circle r="3.5" fill="#c7f284">
        <animateMotion dur="3.2s" fill="freeze" path="M4 8 C 60 16, 70 70, 120 100 S 230 138, 286 141"/>
        <animate attributeName="opacity" values="1;0.35;1" dur="1.4s" begin="3.2s" repeatCount="indefinite"/>
      </circle>
      <text x="0" y="-12" font-family="'Courier New', monospace" font-size="11" letter-spacing="2" fill="#71717a">TRAINING LOSS</text>
      <text x="200" y="130" font-family="'Courier New', monospace" font-size="11" fill="#c7f284">0.041 ↓</text>
    </g>

    <!-- hud line -->
    <text x="560" y="224" font-family="'Courier New', monospace" font-size="11" letter-spacing="1" fill="#71717a">run: karan-v3 · uptime 24y · state: caffeinated</text>

    <rect x="0.5" y="0.5" width="899" height="249" rx="16" stroke="#ffffff" stroke-opacity="0.12" fill="none"/>
  </g>
</svg>
