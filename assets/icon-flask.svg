<svg width="30" height="30" viewBox="0 0 15 15" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <g fill="#9aa3ad">
    <rect x="6" y="1" width="3" height="1"/><rect x="6" y="2" width="1" height="4"/><rect x="8" y="2" width="1" height="4"/>
    <rect x="5" y="6" width="1" height="2"/><rect x="9" y="6" width="1" height="2"/>
    <rect x="4" y="8" width="1" height="4"/><rect x="10" y="8" width="1" height="4"/>
    <rect x="5" y="12" width="5" height="1"/>
  </g>
  <g fill="#67e8f9">
    <rect x="5" y="9" width="5" height="3" opacity="0.85"/>
    <rect x="6" y="8" width="1" height="1">
      <animate attributeName="y" values="10;6;10" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0;0.9" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="8" y="9" width="1" height="1">
      <animate attributeName="y" values="10;5;10" dur="2.8s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0;0.9" dur="2.8s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
